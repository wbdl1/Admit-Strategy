<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admit Strategy Portal</title>
<style>
:root{--bg:#050816;--text:#f7fbff;--muted:#aab7cf;--line:rgba(255,255,255,.14);--accent:#7c5cff;--accent2:#20e3b2}*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}body{background:radial-gradient(circle at 20% 10%,rgba(124,92,255,.38),transparent 30%),radial-gradient(circle at 80% 10%,rgba(32,227,178,.22),transparent 28%),var(--bg);color:var(--text);min-height:100vh;padding:26px}.wrap{max-width:1100px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.brand{font-size:1.3rem;font-weight:900}.pill{padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid var(--line);color:var(--muted)}.hero,.card{border:1px solid var(--line);background:rgba(255,255,255,.08);backdrop-filter:blur(18px);border-radius:26px;box-shadow:0 25px 70px rgba(0,0,0,.28)}.hero{padding:28px;margin-bottom:18px}.hero h1{font-size:clamp(2.3rem,5vw,4rem);letter-spacing:-2px;margin-bottom:10px}.hero p{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}.card{padding:20px}.card h2{font-size:1.2rem;margin-bottom:10px}.num{font-size:2.3rem;font-weight:950;background:linear-gradient(90deg,#fff,#adfff0);-webkit-background-clip:text;color:transparent}.muted{color:var(--muted);line-height:1.65}.bar{height:10px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:12px;overflow:hidden}.bar div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}.wide{display:grid;grid-template-columns:1fr 1fr;gap:14px}.list{display:grid;gap:9px}.item{padding:12px;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid var(--line);line-height:1.5}.status{display:inline-block;padding:5px 8px;border-radius:999px;background:rgba(32,227,178,.12);color:#adfff0;font-size:.8rem;font-weight:800;margin-left:6px}.error{padding:20px;border:1px solid rgba(255,255,255,.14);border-radius:20px;background:rgba(255,255,255,.08);line-height:1.7;color:#ffdede}@media(max-width:850px){.grid,.wide{grid-template-columns:1fr}.top{align-items:flex-start;gap:10px;flex-direction:column}}</style>
</head>
<body><div class="wrap"><div class="top"><div class="brand">Admit Strategy Portal</div><div class="pill">Private student progress link</div></div><div id="app"><div class="hero"><h1>Loading portal...</h1><p>Please wait.</p></div></div></div>
<script>
const CONFIG={googleScriptUrl:"https://script.google.com/macros/s/AKfycbzpK0tquYfwMMb1xff1HPrXI1BDZPMymux4QbVM9lqFup8bLtJoXOaIVTKbH6ePqJGJ_Q/exec"};
function isConnected(){return CONFIG.googleScriptUrl&&CONFIG.googleScriptUrl.startsWith("https://script.google.com/macros/s/")&&!CONFIG.googleScriptUrl.includes("PASTE_YOUR")}
function getToken(){return new URLSearchParams(location.search).get("token")||""}
function jsonp(url,callbackName="callback",timeout=8000){return new Promise((resolve,reject)=>{const cb="jsonp_"+Date.now()+"_"+Math.random().toString(16).slice(2);window[cb]=(data)=>{cleanup();resolve(data)};function cleanup(){delete window[cb];script.remove();clearTimeout(timer)}const script=document.createElement("script");script.src=url+(url.includes("?")?"&":"?")+callbackName+"="+cb;script.onerror=()=>{cleanup();reject(new Error("Request failed"))};const timer=setTimeout(()=>{cleanup();reject(new Error("Request timed out"))},timeout);document.body.appendChild(script)})}
function pct(n){n=Number(n||0);return Math.max(0,Math.min(100,n))}
function list(items,empty){if(!items||!items.length)return `<div class="item muted">${empty}</div>`;return items.map(x=>`<div class="item"><strong>${x.title||x.name||"Task"}</strong>${x.status?`<span class="status">${x.status}</span>`:""}<br><span class="muted">${x.detail||x.notes||""}</span></div>`).join("")}
function render(d){document.getElementById("app").innerHTML=`<div class="hero"><h1>Welcome, ${d.student.name||"student"}.</h1><p>${d.student.summary||"Track your weekly tasks, progress, weak points, upcoming meetings, and next actions."}</p></div><div class="grid"><div class="card"><h2>Study System</h2><div class="num">${pct(d.progress.studySystem)}%</div><div class="bar"><div style="width:${pct(d.progress.studySystem)}%"></div></div></div><div class="card"><h2>Consistency</h2><div class="num">${pct(d.progress.consistency)}%</div><div class="bar"><div style="width:${pct(d.progress.consistency)}%"></div></div></div><div class="card"><h2>Direction</h2><div class="num">${pct(d.progress.direction)}%</div><div class="bar"><div style="width:${pct(d.progress.direction)}%"></div></div></div></div><div class="wide"><div class="card"><h2>Weekly Tasks</h2><div class="list">${list(d.tasks,"No tasks yet.")}</div></div><div class="card"><h2>Weak Points</h2><div class="list">${list(d.weakPoints,"No weak points added yet.")}</div></div><div class="card"><h2>Next Meeting</h2><p class="muted">${d.nextMeeting||"No upcoming meeting found."}</p></div><div class="card"><h2>Parent Update</h2><p class="muted">${d.parentUpdate||"Parent update coming soon."}</p></div><div class="card"><h2>Session Notes</h2><div class="list">${list(d.sessionNotes,"No session notes yet.")}</div></div><div class="card"><h2>Extracurricular / Project</h2><div class="list">${list(d.projects,"No project updates yet.")}</div></div></div>`}
async function load(){const token=getToken();if(!isConnected()){document.getElementById("app").innerHTML='<div class="error">Portal backend is not connected yet. Paste your Google Apps Script Web App URL into portal.html.</div>';return}if(!token){document.getElementById("app").innerHTML='<div class="error">Missing private portal token. Use the portal link from your confirmation email.</div>';return}try{const data=await jsonp(`${CONFIG.googleScriptUrl}?action=portal&token=${encodeURIComponent(token)}`);if(!data.ok)throw new Error(data.error||"Portal unavailable");render(data)}catch(e){document.getElementById("app").innerHTML=`<div class="error">Could not load portal: ${e.message}</div>`}}
load();
</script></body></html>
