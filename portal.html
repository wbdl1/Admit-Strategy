<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admit Strategy Portal</title>
<style>
:root{
  --bg:#050816;--card:rgba(255,255,255,.085);--card2:rgba(255,255,255,.12);
  --text:#f7fbff;--muted:#aab7cf;--line:rgba(255,255,255,.14);
  --accent:#7c5cff;--accent2:#20e3b2;--warn:#fff4b8;--red:#ffd8d8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
body{
  min-height:100vh;color:var(--text);
  background:
    radial-gradient(circle at 18% 8%,rgba(124,92,255,.38),transparent 28%),
    radial-gradient(circle at 82% 12%,rgba(32,227,178,.25),transparent 28%),
    #050816;
  padding:26px;
}
.wrap{max-width:1120px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px}
.brand{font-weight:950;font-size:1.28rem;letter-spacing:-.3px}
.pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid var(--line);color:#dce8ff}
.hero,.card,.error{
  border:1px solid var(--line);background:var(--card);backdrop-filter:blur(18px);
  border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.28)
}
.hero{padding:30px;margin-bottom:16px}
.hero h1{font-size:clamp(2.4rem,5vw,4.5rem);line-height:1;letter-spacing:-2px;margin-bottom:12px}
.hero p{color:var(--muted);line-height:1.7;font-size:1.05rem}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.card{padding:22px}
.card h2{font-size:1.15rem;margin-bottom:10px}
.num{font-size:2.45rem;font-weight:950;letter-spacing:-1.5px;background:linear-gradient(90deg,#fff,#adfff0);-webkit-background-clip:text;color:transparent}
.bar{height:10px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:12px;overflow:hidden}
.bar div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.list{display:grid;gap:10px}
.item{padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid var(--line);line-height:1.5}
.item strong{display:inline-block;margin-bottom:4px}
.muted{color:var(--muted);line-height:1.65}
.status{display:inline-block;margin-left:7px;padding:5px 8px;border-radius:999px;background:rgba(32,227,178,.12);color:#adfff0;font-size:.78rem;font-weight:850}
.error{padding:24px;line-height:1.7;color:var(--red)}
.error h1{font-size:1.4rem;margin-bottom:8px}
.error code{background:rgba(255,255,255,.11);padding:3px 6px;border-radius:7px;color:#fff}
.help{margin-top:14px;color:var(--warn)}
.footer{margin-top:18px;text-align:center;color:var(--muted);font-size:.9rem}
@media(max-width:850px){.grid,.columns{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">Admit Strategy Portal</div>
    <div class="pill">Private student progress link</div>
  </div>

  <div id="app">
    <div class="hero">
      <h1>Loading portal...</h1>
      <p>Please wait while your progress page loads.</p>
    </div>
  </div>

  <div class="footer">Admit Strategy • Rayan (Ryan) Zayd Quereshi</div>
</div>

<script>
const CONFIG = {
  googleScriptUrl: "https://script.google.com/macros/s/AKfycbzpK0tquYfwMMb1xff1HPrXI1BDZPMymux4QbVM9lqFup8bLtJoXOaIVTKbH6ePqJGJ_Q/exec"
};

function isConnected(){
  return CONFIG.googleScriptUrl &&
    CONFIG.googleScriptUrl.startsWith("https://script.google.com/macros/s/") &&
    !CONFIG.googleScriptUrl.includes("PASTE_YOUR");
}

function getToken(){
  return new URLSearchParams(location.search).get("token") || "";
}

function jsonp(url, callbackName="callback", timeout=10000){
  return new Promise((resolve,reject)=>{
    const cb = "jsonp_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    const script = document.createElement("script");
    const timer = setTimeout(()=>{ cleanup(); reject(new Error("Request timed out. The backend may not be deployed correctly.")); }, timeout);

    function cleanup(){
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    }

    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error("Request failed. Check your Google Apps Script Web App URL.")); };
    script.src = url + (url.includes("?") ? "&" : "?") + callbackName + "=" + cb;
    document.body.appendChild(script);
  });
}

function pct(n){
  n = Number(n || 0);
  return Math.max(0, Math.min(100, n));
}

function safe(s){
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function list(items, empty){
  if(!items || !items.length) return `<div class="item muted">${safe(empty)}</div>`;
  return items.map(x => `
    <div class="item">
      <strong>${safe(x.title || x.name || "Update")}</strong>
      ${x.status ? `<span class="status">${safe(x.status)}</span>` : ""}
      <br><span class="muted">${safe(x.detail || x.notes || "")}</span>
    </div>
  `).join("");
}

function renderError(title, message, help=""){
  document.getElementById("app").innerHTML = `
    <div class="error">
      <h1>${safe(title)}</h1>
      <p>${message}</p>
      ${help ? `<p class="help">${help}</p>` : ""}
    </div>
  `;
}

function render(d){
  document.getElementById("app").innerHTML = `
    <div class="hero">
      <h1>Welcome, ${safe(d.student.name || "student")}.</h1>
      <p>${safe(d.student.summary || "Track your weekly tasks, weak points, meetings, parent updates, and progress.")}</p>
    </div>

    <div class="grid">
      ${progressCard("Study System", d.progress.studySystem)}
      ${progressCard("Consistency", d.progress.consistency)}
      ${progressCard("Direction", d.progress.direction)}
    </div>

    <div class="columns">
      <div class="card">
        <h2>Next Meeting</h2>
        <p class="muted">${safe(d.nextMeeting || "No upcoming meeting found yet.")}</p>
      </div>

      <div class="card">
        <h2>Parent Update</h2>
        <p class="muted">${safe(d.parentUpdate || "Parent update coming soon.")}</p>
      </div>

      <div class="card">
        <h2>Weekly Tasks</h2>
        <div class="list">${list(d.tasks, "No tasks added yet.")}</div>
      </div>

      <div class="card">
        <h2>Weak Points</h2>
        <div class="list">${list(d.weakPoints, "No weak points added yet.")}</div>
      </div>

      <div class="card">
        <h2>Session Notes</h2>
        <div class="list">${list(d.sessionNotes, "No session notes added yet.")}</div>
      </div>

      <div class="card">
        <h2>Projects / Extracurriculars</h2>
        <div class="list">${list(d.projects, "No project updates added yet.")}</div>
      </div>
    </div>
  `;
}

function progressCard(title, value){
  const v = pct(value);
  return `
    <div class="card">
      <h2>${safe(title)}</h2>
      <div class="num">${v}%</div>
      <div class="bar"><div style="width:${v}%"></div></div>
    </div>
  `;
}

async function load(){
  const token = getToken();

  if(!isConnected()){
    renderError(
      "Portal backend is not connected.",
      "Paste your Google Apps Script Web App URL into <code>portal.html</code>, then commit the file to GitHub.",
      "The main website and portal each need the same Google Apps Script URL."
    );
    return;
  }

  if(!token){
    renderError(
      "Missing private portal token.",
      "Open the full private portal link from the Bookings tab, not just <code>portal.html</code>.",
      "The correct link should look like: <code>portal.html?token=...</code>"
    );
    return;
  }

  try{
    const data = await jsonp(`${CONFIG.googleScriptUrl}?action=portal&token=${encodeURIComponent(token)}`);

    if(!data.ok){
      renderError(
        "Could not load this portal.",
        safe(data.error || "Portal unavailable."),
        safe(data.help || "Use the portalUrl column from the Bookings tab, or the portalToken column from the Students tab.")
      );
      return;
    }

    render(data);
  }catch(e){
    renderError("Could not load portal.", safe(e.message));
  }
}

load();
</script>
</body>
</html>
